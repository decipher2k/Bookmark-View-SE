<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Viewer SE</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="content-shell">
        <div class="sticky-header">
          <section class="controls-panel">
            <div id="category-bar"></div>
            <div id="subcategory-bar"></div>
          </section>

          <section class="status-bar">
            <div id="warning-banner" class="warning-banner" hidden></div>
            <div class="inline-controls">
              <div id="search-controls" class="search-controls-inline"></div>
              <button id="folders-button" class="action-button-small" type="button">Folders</button>
              <button id="refresh-button" class="action-button-small" type="button">Refresh</button>
            </div>
          </section>
        </div>

        <section id="folder-panel" class="folder-panel" hidden></section>

        <section id="cards-grid" class="cards-grid" aria-live="polite"></section>
        <section id="empty-state" class="empty-state" hidden>
          <h2>No Bookmarks Found</h2>
          <p>Check the browser selection or adjust your search and category filters.</p>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
